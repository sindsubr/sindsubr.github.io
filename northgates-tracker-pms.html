<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#f5f4f1;font-family:'DM Sans',sans-serif;font-size:14px;color:#1a1a1a}
:root{--red:#C62828;--red-dark:#B71C1C;--red-light:#FFEBEE;--bg:#f5f4f1;--surface:#ffffff;--surface2:#f0efec;--border:#e8e6e1;--border2:#d4d1cb;--text:#1a1a1a;--text2:#6b6860;--text3:#9b9890;--green:#2E7D32;--orange:#E65100;--blue:#1565C0;--purple:#6A1B9A;--radius:10px;--radius-sm:6px;--shadow:0 1px 3px rgba(0,0,0,.08)}

.user-pill{background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.3);border-radius:20px;padding:4px 12px;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:6px}
.tabs{background:var(--surface);border-bottom:1px solid var(--border);display:flex;padding:0 20px;flex-shrink:0;overflow-x:auto}.tab{padding:11px 13px;font-size:12px;cursor:pointer;color:var(--text2);border-bottom:2px solid transparent;display:flex;align-items:center;gap:6px;white-space:nowrap;font-weight:500}.tab.active{color:var(--red);border-bottom-color:var(--red)}.tab:hover:not(.active){color:var(--text)}.tab i{font-size:15px}
.toolbar{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;flex-shrink:0}.content{flex:1;overflow:auto;padding:16px 20px}select,input[type=text],input[type=email],input[type=password],input[type=date],input[type=number]{font-family:'DM Sans',sans-serif;font-size:12px;padding:6px 10px;border-radius:var(--radius-sm);border:1px solid var(--border2);background:var(--surface);color:var(--text);height:32px;outline:none}select:focus,input:focus,textarea:focus{border-color:var(--red)}.search-input{width:190px}.btn-add,.btn{background:var(--red);color:#fff;border:none;padding:0 14px;border-radius:var(--radius-sm);font-size:12px;font-family:'DM Sans',sans-serif;cursor:pointer;height:32px;display:inline-flex;align-items:center;gap:5px;font-weight:500}.btn-add:hover,.btn:hover{background:var(--red-dark)}.btn.grey{background:var(--text2)}.btn.green{background:#1d6f42}.btn.blue{background:var(--blue)}.btn.orange{background:var(--orange)}.btn.small{height:26px;padding:0 9px;font-size:11px}.btn.ghost{background:#fff;color:var(--text2);border:1px solid var(--border2)}
.q-summ{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}.sc{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px}.sc-n{font-size:22px;font-weight:600;color:var(--text)}.sc-l{font-size:11px;color:var(--text2);margin-top:2px}.q-wrap{overflow:auto;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius)}.qtable,.ltable{width:100%;border-collapse:collapse;font-size:12px}.qtable th,.ltable th{text-align:left;padding:8px 12px;font-size:10px;font-weight:600;color:var(--text2);border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:.5px;background:var(--surface);position:sticky;top:0;z-index:1}.qtable td,.ltable td{padding:9px 12px;border-bottom:1px solid var(--border);color:var(--text);vertical-align:middle}.qtable tr:hover td,.ltable tr:hover td{background:var(--surface2)}
.qbadge,.sp{padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600;display:inline-flex;white-space:nowrap}.q-sent{background:#EBF5FB;color:#1565C0}.q-draft{background:#FFF3E0;color:#E65100}.q-acc,.q-paid{background:#EAFAF1;color:#1E8449}.q-pend,.q-over{background:#FDEDEC;color:#922B21}.q-lost{background:#f3f4f6;color:#6b7280}.q-site{background:#FFF8E1;color:#F57F17}.q-po{background:#F3E5F5;color:#6A1B9A}.q-active{background:#EBF5FB;color:#1565C0}.q-hold{background:#FFF3E0;color:#E65100}
.board{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;align-items:start}.col{background:var(--surface2);border-radius:var(--radius);padding:12px;min-height:200px;border:1px solid var(--border)}.col-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}.col-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:var(--text2)}.col-badge{background:var(--surface);border:1px solid var(--border2);border-radius:20px;padding:1px 8px;font-size:10px;color:var(--text2);font-weight:600}.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:11px 12px;margin-bottom:8px;cursor:pointer;transition:box-shadow .15s,border-color .15s}.card:hover{box-shadow:var(--shadow);border-color:var(--border2)}.card.p-high{border-left:3px solid #E53935}.card.p-medium{border-left:3px solid #FB8C00}.card.p-low{border-left:3px solid #43A047}.card-title{font-size:13px;font-weight:500;margin-bottom:5px;line-height:1.4}.card-sub{font-size:11px;color:var(--text2);margin-bottom:8px;line-height:1.5}.card-foot{display:flex;align-items:center;justify-content:space-between}.cat-badge{font-size:10px;padding:2px 7px;border-radius:20px;background:#EEF2FF;color:#3730a3;font-weight:500}.empty-col{text-align:center;padding:24px 8px;color:var(--text3);font-size:11px}.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:600;color:#fff;flex-shrink:0}.av-SI{background:#1565C0}.av-ME{background:#6A1B9A}.av-SK{background:#B71C1C}.av-SN{background:#2E7D32}.aname{font-size:11px;color:var(--text2)}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:300;align-items:center;justify-content:center}.modal-bg.open{display:flex}.modal{background:var(--surface);border-radius:var(--radius);padding:22px;width:620px;max-width:95vw;box-shadow:0 8px 32px rgba(0,0,0,.15);max-height:90vh;overflow-y:auto}.modal h2{font-size:15px;font-weight:600;margin-bottom:18px}.fr{margin-bottom:13px}.fr label{display:block;font-size:11px;font-weight:600;color:var(--text2);margin-bottom:4px;text-transform:uppercase;letter-spacing:.4px}.fr input,.fr select,.fr textarea{width:100%;font-family:'DM Sans',sans-serif;font-size:13px;padding:8px 10px;border-radius:var(--radius-sm);border:1px solid var(--border2);background:var(--surface);color:var(--text);outline:none}.fr textarea{height:80px;resize:vertical}.f2{display:grid;grid-template-columns:1fr 1fr;gap:10px}.f3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}.m-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:18px}.btn-cancel{background:none;border:1px solid var(--border2);padding:8px 16px;border-radius:var(--radius-sm);font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;color:var(--text)}.btn-save{background:var(--red);color:#fff;border:none;padding:8px 20px;border-radius:var(--radius-sm);font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:500}.btn-del{background:none;border:1px solid #fca5a5;color:#dc2626;padding:8px 14px;border-radius:var(--radius-sm);font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;margin-right:auto}.inline-row{display:flex;gap:6px;align-items:center}.inline-row select,.inline-row input{flex:1}.toast{position:fixed;bottom:20px;right:20px;background:#1a1a1a;color:#fff;padding:10px 16px;border-radius:var(--radius-sm);font-size:12px;font-weight:500;z-index:999;opacity:0;transform:translateY(8px);transition:all .25s;pointer-events:none}.toast.show{opacity:1;transform:translateY(0)}.update-flash{position:fixed;top:60px;right:16px;background:#2E7D32;color:#fff;padding:8px 14px;border-radius:var(--radius-sm);font-size:12px;font-weight:500;z-index:500;opacity:0;transform:translateY(-8px);transition:all .3s;pointer-events:none;display:flex;align-items:center;gap:6px}.update-flash.show{opacity:1;transform:translateY(0)}.detail-panel{background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:12px;margin-top:8px}.subhead{display:flex;align-items:center;justify-content:space-between;margin:8px 0}.subhead h3{font-size:13px}.muted{color:var(--text2);font-size:11px}.profit-pos{color:var(--green);font-weight:700}.profit-neg{color:var(--red);font-weight:700}.user-modal{background:var(--surface);border-radius:var(--radius);padding:28px;width:360px;max-width:95vw;box-shadow:0 8px 32px rgba(0,0,0,.2)}
@media(max-width:800px){.board{grid-template-columns:1fr}.q-summ{grid-template-columns:repeat(2,1fr)}.f2,.f3{grid-template-columns:1fr}.topbar h1{display:none}.hstat-l{display:none}.search-input{width:130px}}
.vbtn{background:none;border:1px solid var(--border2);border-radius:var(--radius-sm);padding:0 9px;height:32px;cursor:pointer;color:var(--text2);font-size:13px;display:flex;align-items:center}.vbtn.active{background:var(--red);color:#fff;border-color:var(--red)}.col.drag-over{background:#e8f5e9;border-color:#81c784}.col-add-btn{width:100%;background:none;border:1px dashed var(--border2);border-radius:var(--radius-sm);padding:7px;font-size:11px;color:var(--text3);cursor:pointer;margin-top:8px;font-family:'DM Sans',sans-serif}.col-add-btn:hover{background:var(--surface);color:var(--text2)}.ltable th{white-space:nowrap}.ltable tr:hover td{background:var(--surface2);cursor:pointer}</style>

<body>
<div class="app" id="app" style="display:none">
<div class="topbar"><div class="topbar-left"><img src="https://raw.githubusercontent.com/sindsubr/sindsubr.github.io/main/0%20NG%20LOGO%20FULL%202027%20WBG.png" class="logo-img" alt="North Gates"><h1>Internal Tracker</h1><span style="font-size:11px;opacity:.7;display:flex;align-items:center;gap:5px"><span class="live-dot"></span>Live</span></div><div class="topbar-right"><div class="hstat"><div class="hstat-n" id="h-tasks">0</div><div class="hstat-l">Tasks</div></div><div class="hstat"><div class="hstat-n" id="h-open">0</div><div class="hstat-l">Open</div></div><div class="hstat"><div class="hstat-n" id="h-quotes">0</div><div class="hstat-l">Quotes</div></div><div class="hstat"><div class="hstat-n" id="h-pipeline">0</div><div class="hstat-l">AED Pipeline</div></div><div class="user-pill" onclick="changeUser()"><i class="ti ti-user"></i><span id="current-user-label">Login</span></div></div></div>
<div class="tabs" id="tabs"></div>
<div id="tab-holder" style="display:flex;flex-direction:column;flex:1;overflow:hidden"></div>
</div>
<div class="modal-bg open" id="user-modal-bg" style="display:flex"><div class="user-modal"><div style="font-size:30px;margin-bottom:10px;text-align:center">🔐</div><h2 style="text-align:center;font-size:16px;margin-bottom:6px">North Gates Login</h2><p style="text-align:center;font-size:12px;color:var(--text2);margin-bottom:20px">Login with your approved North Gates email and password.</p><div class="fr"><label>Email</label><input id="login-email" type="email" placeholder="sindu@northgatesco.com"></div><div class="fr"><label>Password</label><input id="login-password" type="password" placeholder="Enter password" onkeydown="if(event.key==='Enter') loginWithEmail()"></div><button class="btn-save" style="width:100%;height:36px" onclick="loginWithEmail()">Login</button><button class="btn-cancel" style="width:100%;height:34px;margin-top:8px" onclick="sendPasswordReset()">Forgot Password?</button></div></div>
<div class="modal-bg" id="modal-bg" onclick="if(event.target===this)closeModal()"><div class="modal"><h2 id="modal-title">Form</h2><div id="modal-body"></div><div class="m-actions"><button class="btn-del" id="modal-delete" style="display:none" onclick="deleteCurrent()"><i class="ti ti-trash"></i> Delete</button><button class="btn-cancel" onclick="closeModal()">Cancel</button><button class="btn-save" onclick="saveCurrent()">Save</button></div></div></div>
<div class="toast" id="toast"></div><div class="update-flash" id="update-flash"><i class="ti ti-refresh"></i><span id="uf-text"></span></div>
<script>
const firebaseConfig={apiKey:"AIzaSyBFFtMkqBVjBFxU7fxbMIiMtwm7zTh-MuM",authDomain:"northgates-tracker-888cc.firebaseapp.com",projectId:"northgates-tracker-888cc",storageBucket:"northgates-tracker-888cc.firebasestorage.app",messagingSenderId:"199880101711",appId:"1:199880101711:web:2af98b98704c1599643f3a"};
let db,auth,useFirebase=false;try{firebase.initializeApp(firebaseConfig);db=firebase.firestore();auth=firebase.auth();useFirebase=true}catch(e){console.warn(e)}
const USERS_BY_EMAIL={'info@northgatesco.com':{name:'SK',initials:'SK'},'sindu@northgatesco.com':{name:'Sindu',initials:'SN'},'siddarth@northgatesco.com':{name:'Siddarth',initials:'SI'},'meeran@northgatesco.com':{name:'Meeran',initials:'ME'}};
const INI={Siddarth:'SI',Meeran:'ME',SK:'SK',Sindu:'SN'};const AVC={Siddarth:'av-SI',Meeran:'av-ME',SK:'av-SK',Sindu:'av-SN'};
const LOGO_URL='https://raw.githubusercontent.com/sindsubr/sindsubr.github.io/main/0%20NG%20LOGO%20FULL%202027%20WBG.png';let _logoDataUrl=null;function _preloadLogo(){if(_logoDataUrl)return Promise.resolve(_logoDataUrl);return new Promise(res=>{const img=new Image();img.crossOrigin='anonymous';img.onload=()=>{const c=document.createElement('canvas');c.width=img.width;c.height=img.height;c.getContext('2d').drawImage(img,0,0);_logoDataUrl=c.toDataURL('image/png');res(_logoDataUrl)};img.onerror=()=>res(null);img.src=LOGO_URL})}
let currentUser=null,currentUserEmail=null,activeTab='tasks',currentForm=null,editId=null,expandedProject=null;
const data={tasks:[],rfqs:[],vendorQuotes:[],quotes:[],projects:[],taxInvoices:[],clients:[],vendors:[]};
const collections={tasks:'ng_tasks',rfqs:'ng_rfqs',vendorQuotes:'ng_vendor_quotes',quotes:'ng_quotes',projects:'ng_projects',taxInvoices:'ng_tax_invoices',clients:'ng_clients',vendors:'ng_vendors'};
const tabs=[['tasks','Tasks','ti-checklist'],['rfqs','RFQ Register','ti-file-search'],['vendorQuotes','Vendor Quotes','ti-receipt'],['quotes','Quote Register','ti-file-invoice'],['projects','Projects','ti-building-skyscraper'],['taxInvoices','Tax Invoice','ti-file-dollar'],['vat','VAT Data','ti-calculator'],['clients','Client Details','ti-users'],['vendors','Vendor Details','ti-truck']];
function isAdmin(){return currentUserEmail==='sindu@northgatesco.com'||currentUserEmail==='info@northgatesco.com'}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500)}
function flashUpdate(msg){const el=document.getElementById('update-flash');document.getElementById('uf-text').textContent=msg;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),4500)}
function money(n){n=parseFloat(n)||0;return 'AED '+n.toLocaleString('en-AE',{minimumFractionDigits:2,maximumFractionDigits:2})}function num(v){return parseFloat(v)||0}function today(){return new Date().toISOString().slice(0,10)}function esc(s){return String(s??'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]))}
function avHTML(name,sz=20){return `<div class="av ${AVC[name]||'av-SI'}" style="width:${sz}px;height:${sz}px;font-size:${Math.round(sz*.43)}px">${INI[name]||'??'}</div>`}
function loginWithEmail(){if(!auth){showToast('Firebase Auth is not ready');return}const email=(document.getElementById('login-email').value||'').trim().toLowerCase(),password=document.getElementById('login-password').value||'';if(!email||!password){showToast('Please enter email and password');return}if(!USERS_BY_EMAIL[email]){showToast('Access denied: this email is not allowed');return}auth.signInWithEmailAndPassword(email,password).catch(err=>showToast(err.message||'Login failed'))}
function sendPasswordReset(){const email=(document.getElementById('login-email').value||'').trim().toLowerCase();if(!email){showToast('Enter email first');return}if(!USERS_BY_EMAIL[email]){showToast('Access denied');return}auth.sendPasswordResetEmail(email).then(()=>showToast('Password reset email sent')).catch(e=>showToast(e.message||'Could not send reset'))}
function showLogin(){document.getElementById('app').style.display='none';document.getElementById('user-modal-bg').style.display='flex';document.getElementById('user-modal-bg').classList.add('open')}function showApp(){document.getElementById('app').style.display='flex';document.getElementById('user-modal-bg').style.display='none';document.getElementById('current-user-label').textContent=currentUser+' ▾'}function changeUser(){if(confirm('Logout from '+currentUser+'?'))auth.signOut()}
function handleAllowedUser(user){const email=(user.email||'').toLowerCase();const profile=USERS_BY_EMAIL[email];if(!profile){showToast('Access denied: '+email);auth.signOut();return}currentUser=profile.name;currentUserEmail=email;showApp();initUI();startListeners();showToast('Welcome, '+currentUser+'!')}
if(useFirebase&&auth){auth.onAuthStateChanged(user=>user?handleAllowedUser(user):(currentUser=null,currentUserEmail=null,showLogin()))}else{currentUser='Sindu';currentUserEmail='sindu@northgatesco.com';showApp();initUI();render();}
function initUI(){document.getElementById('tabs').innerHTML=tabs.map(t=>`<div class="tab ${t[0]===activeTab?'active':''}" onclick="switchTab('${t[0]}',this)"><i class="ti ${t[2]}"></i>${t[1]}</div>`).join('');}
let listenersStarted=false;function startListeners(){if(listenersStarted)return;listenersStarted=true;if(!useFirebase||!db){render();return}Object.entries(collections).forEach(([key,col])=>{db.collection(col).onSnapshot(snap=>{const oldLen=data[key].length;data[key]=[];snap.forEach(doc=>data[key].push({_id:doc.id,...doc.data()}));if(oldLen&&snap.docChanges().some(ch=>ch.type==='added'||ch.type==='modified')){const ch=snap.docChanges().find(c=>c.type==='added'||c.type==='modified');const d=ch.doc.data();if(d.updatedBy&&d.updatedBy!==currentUser)flashUpdate(d.updatedBy+' updated '+labelOf(key)+': '+(d.title||d.no||d.name||'record'))}render()},e=>console.warn('listener',key,e))})}
function labelOf(k){return {tasks:'Task',rfqs:'RFQ',vendorQuotes:'Vendor Quote',quotes:'Quote',projects:'Project',taxInvoices:'Invoice',clients:'Client',vendors:'Vendor'}[k]||k}
async function saveDoc(key,obj,id){const payload={...obj,updatedBy:currentUser||'Unknown',updatedAt:new Date().toISOString()};if(useFirebase&&db){try{if(id)await db.collection(collections[key]).doc(id).update(payload);else await db.collection(collections[key]).add({...payload,createdAt:Date.now()});showToast(labelOf(key)+' saved ✓');return}catch(e){console.warn(e);showToast('Firebase error — saved locally')}}if(id){const i=data[key].findIndex(x=>x._id===id);if(i>=0)data[key][i]={...data[key][i],...payload}}else data[key].unshift({_id:'l'+Date.now(),...payload});render()}
async function deleteDoc(key,id){if(!isAdmin()){showToast('Admin only');return}if(!confirm('Delete this record?'))return;if(useFirebase&&db){try{await db.collection(collections[key]).doc(id).delete();showToast('Deleted');return}catch(e){console.warn(e)}}data[key]=data[key].filter(x=>x._id!==id);render();showToast('Deleted')}
function switchTab(name,el){activeTab=name;document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));if(el)el.classList.add('active');render()}
function render(){updateHeader();const h=document.getElementById('tab-holder');if(!h)return;({tasks:renderTasks,rfqs:renderRFQs,vendorQuotes:renderVendorQuotes,quotes:renderQuotes,projects:renderProjects,taxInvoices:renderTaxInvoices,vat:renderVAT,clients:()=>renderDirectory('clients'),vendors:()=>renderDirectory('vendors')}[activeTab]||renderTasks)()}
function updateHeader(){document.getElementById('h-tasks').textContent=data.tasks.length;document.getElementById('h-open').textContent=data.tasks.filter(t=>t.status!=='done').length;document.getElementById('h-quotes').textContent=data.quotes.length;document.getElementById('h-pipeline').textContent=(data.quotes.reduce((s,q)=>s+num(q.sellPrice||q.amt),0)/1000000).toFixed(2)+'M'}
function page(toolbar,body){document.getElementById('tab-holder').innerHTML=`<div class="toolbar">${toolbar}</div><div class="content">${body}</div>`}
function optionList(arr,val='name'){return arr.map(x=>`<option value="${esc(x[val])}">${esc(x[val])}</option>`).join('')}function quoteOptions(){return data.quotes.map(q=>`<option value="${esc(q.no)}">${esc(q.no)} — ${esc(q.client||'')}</option>`).join('')}function vendorQuoteOptions(){return data.vendorQuotes.map(v=>`<option value="${esc(v.no)}">${esc(v.no)} — ${esc(v.vendor||'')} (${money(v.amount)})</option>`).join('')}function projectOptions(){return data.projects.map(p=>`<option value="${esc(p.no)}">${esc(p.no)} — ${esc(p.title||'')}</option>`).join('')}

let taskView='board',taskDragId=null,taskFilterA='',taskFilterP='',taskFilterQ='';const taskSort={col:'',dir:'asc'};
function taskFiltered(){const a=taskFilterA,p=taskFilterP,q=(taskFilterQ||'').toLowerCase();let arr=data.tasks.filter(t=>(!a||t.assignee===a)&&(!p||t.priority===p)&&(!q||(t.title||'').toLowerCase().includes(q)||(t.desc||'').toLowerCase().includes(q)||(t.cat||'').toLowerCase().includes(q)));if(taskSort.col){arr=[...arr].sort((x,y)=>{let vx=x[taskSort.col]??'',vy=y[taskSort.col]??'';const po={high:0,medium:1,low:2},so={todo:0,progress:1,review:2,done:3};if(taskSort.col==='priority'){vx=po[vx]??9;vy=po[vy]??9}else if(taskSort.col==='status'){vx=so[vx]??9;vy=so[vy]??9}else{vx=String(vx).toLowerCase();vy=String(vy).toLowerCase()}if(vx<vy)return taskSort.dir==='asc'?-1:1;if(vx>vy)return taskSort.dir==='asc'?1:-1;return 0})}return arr}
function sortTask(col){if(taskSort.col===col)taskSort.dir=taskSort.dir==='asc'?'desc':'asc';else{taskSort.col=col;taskSort.dir='asc'}renderTasks()}
function taskSortMark(col){return taskSort.col===col?(taskSort.dir==='asc'?' ↑':' ↓'):''}
function switchTaskView(v){taskView=v;renderTasks()}
function taskDeadline(t){if(!t.deadline)return '–';try{return new Date(t.deadline).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'2-digit'})}catch(e){return t.deadline}}
function taskModified(t){if(!t.updatedBy&&!t.updatedAt)return '–';let d='';if(t.updatedAt){try{d=new Date(t.updatedAt).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'2-digit'})}catch(e){}}return esc((t.updatedBy||'')+(d?' · '+d:''))}
function taskCard(t){return `<div class="card p-${t.priority||'medium'}" draggable="true" ondragstart="taskDrag(event,'${t._id}')" onclick="openTask('${t._id}')"><div class="card-title">${esc(t.title)}</div>${t.desc?`<div class="card-sub">${esc(String(t.desc).split('\n')[0])}</div>`:''}<div class="card-foot" style="margin-top:6px"><div class="card-foot-left" style="display:flex;align-items:center;gap:5px">${avHTML(t.assignee||'Sindu')}<span class="aname">${esc(t.assignee||'')}</span></div><span class="cat-badge">${esc(t.cat||'')}</span></div><div style="font-size:10px;color:var(--text3);margin-top:6px;border-top:1px solid var(--border);padding-top:5px"><i class="ti ti-pencil"></i> ${taskModified(t)}</div></div>`}
function taskDrag(e,id){taskDragId=id;e.dataTransfer.effectAllowed='move'}function taskAllowDrop(e){e.preventDefault();e.currentTarget.classList.add('drag-over')}function taskLeave(e){e.currentTarget.classList.remove('drag-over')}async function taskDrop(e,status){e.preventDefault();e.currentTarget.classList.remove('drag-over');const t=data.tasks.find(x=>x._id===taskDragId);if(t&&t.status!==status)await saveDoc('tasks',{...t,status},t._id);taskDragId=null}
function renderTasks(){const cols=['todo','progress','review','done'],names={todo:'To Do',progress:'In Progress',review:'Review',done:'Done'},f=taskFiltered();const toolbar=`<button class="btn-add" onclick="openTask()"><i class="ti ti-plus"></i> New Task</button><select id="task-fa" onchange="taskFilterA=this.value;renderTasks()"><option value="">All Members</option>${['Siddarth','Meeran','SK','Sindu'].map(x=>`<option value="${x}">${x}</option>`).join('')}</select><select id="task-fp" onchange="taskFilterP=this.value;renderTasks()"><option value="">All Priorities</option><option value="high">High</option><option value="medium">Medium</option><option value="low">Low</option></select><input type="text" class="search-input" id="task-search" placeholder="Search tasks..." oninput="taskFilterQ=this.value;renderTasks()"><button class="btn grey" onclick="downloadRegisterPDF('tasks')"><i class="ti ti-file-type-pdf"></i> PDF</button><button class="btn green" onclick="downloadCSVFor('tasks')"><i class="ti ti-file-spreadsheet"></i> Excel</button><div style="margin-left:auto;display:flex;gap:3px"><button class="vbtn ${taskView==='board'?'active':''}" onclick="switchTaskView('board')"><i class="ti ti-layout-kanban"></i></button><button class="vbtn ${taskView==='list'?'active':''}" onclick="switchTaskView('list')"><i class="ti ti-list"></i></button></div>`;const board=`<div class="board">${cols.map(c=>`<div class="col" ondragover="taskAllowDrop(event)" ondrop="taskDrop(event,'${c}')" ondragleave="taskLeave(event)"><div class="col-head"><span class="col-label">${names[c]}</span><span class="col-badge">${f.filter(t=>t.status===c).length}</span></div>${f.filter(t=>t.status===c).map(taskCard).join('')||'<div class="empty-col"><i class="ti ti-inbox"></i><br>No tasks</div>'}<button class="col-add-btn" onclick="openTask()">+ Add task</button></div>`).join('')}</div>`;const list=`<div class="q-wrap"><table class="ltable"><thead><tr><th onclick="sortTask('title')" style="cursor:pointer">Task${taskSortMark('title')}</th><th onclick="sortTask('assignee')" style="cursor:pointer">Assigned To${taskSortMark('assignee')}</th><th onclick="sortTask('cat')" style="cursor:pointer">Category${taskSortMark('cat')}</th><th onclick="sortTask('priority')" style="cursor:pointer">Priority${taskSortMark('priority')}</th><th onclick="sortTask('status')" style="cursor:pointer">Status${taskSortMark('status')}</th><th onclick="sortTask('deadline')" style="cursor:pointer">Deadline${taskSortMark('deadline')}</th><th onclick="sortTask('updatedAt')" style="cursor:pointer">Last Modified${taskSortMark('updatedAt')}</th></tr></thead><tbody>${f.map(t=>`<tr onclick="openTask('${t._id}')"><td><strong>${esc(t.title)}</strong>${t.desc?`<br><span style="font-size:10px;color:var(--text2)">${esc(String(t.desc).split('\n').slice(0,2).join(' · '))}</span>`:''}</td><td><div style="display:flex;align-items:center;gap:5px">${avHTML(t.assignee||'Sindu',18)}<span>${esc(t.assignee||'')}</span></div></td><td><span class="cat-badge">${esc(t.cat||'')}</span></td><td><span style="font-size:11px;font-weight:600;color:${t.priority==='high'?'#E53935':t.priority==='low'?'#43A047':'#FB8C00'}">${esc((t.priority||'medium').replace(/^./,m=>m.toUpperCase()))}</span></td><td><span class="sp ${t.status==='done'?'s-done':t.status==='review'?'s-rev':t.status==='progress'?'s-prog':'s-todo'}">${names[t.status]||'To Do'}</span></td><td>${taskDeadline(t)}</td><td>${taskModified(t)}</td></tr>`).join('')||'<tr><td colspan="7">No tasks found</td></tr>'}</tbody></table></div>`;page(toolbar,taskView==='board'?board:list);setTimeout(()=>{const a=document.getElementById('task-fa'),p=document.getElementById('task-fp'),q=document.getElementById('task-search');if(a)a.value=taskFilterA;if(p)p.value=taskFilterP;if(q)q.value=taskFilterQ},0)}

function renderQuotes(){const f=data.quotes;page(`<button class="btn-add" onclick="openQuote()"><i class="ti ti-plus"></i> New Quote</button><button class="btn grey" onclick="downloadRegisterPDF('quotes')"><i class="ti ti-file-type-pdf"></i> PDF</button><button class="btn green" onclick="downloadCSVFor('quotes')"><i class="ti ti-file-spreadsheet"></i> CSV</button>`,`<div class="q-summ"><div class="sc"><div class="sc-n">${f.length}</div><div class="sc-l">Total Quotes</div></div><div class="sc"><div class="sc-n">${money(f.reduce((s,q)=>s+num(q.sellPrice),0))}</div><div class="sc-l">Sell Value</div></div><div class="sc"><div class="sc-n">${money(f.reduce((s,q)=>s+Math.max(num(q.sellPrice)-num(q.costPrice),0),0))}</div><div class="sc-l">Estimated Profit</div></div><div class="sc"><div class="sc-n">${f.filter(q=>q.status==='Client PO Issued').length}</div><div class="sc-l">PO Issued</div></div></div><div class="q-wrap"><table class="qtable"><thead><tr><th>Date</th><th>Quote No.</th><th>Client</th><th>Scope / Location</th><th>Sell</th><th>Margin</th><th>Status</th><th>Actions</th></tr></thead><tbody>${f.map(q=>{const margin=num(q.sellPrice)?((num(q.sellPrice)-num(q.costPrice))/num(q.sellPrice)*100):0;return `<tr><td>${esc(q.date||'')}</td><td style="font-family:DM Mono">${esc(q.no||'')}</td><td>${esc(q.client||'')}</td><td>${esc(q.scope||'')}<br><span class="muted">${esc(q.loc||'')}</span></td><td>${money(q.sellPrice)}</td><td>${margin.toFixed(1)}%</td><td><span class="qbadge ${q.status==='Client PO Issued'?'q-po':q.status==='Accepted'?'q-acc':q.status==='Lost'?'q-lost':q.status==='Sent'?'q-sent':'q-draft'}">${esc(q.status||'Draft')}</span></td><td><button class="btn small ghost" onclick="openQuote('${q._id}')">Edit</button><button class="btn small blue" onclick="downloadQuotePDF('${q._id}',false)">Client PDF</button>${isAdmin()?`<button class="btn small orange" onclick="downloadQuotePDF('${q._id}',true)">Margin PDF</button>`:''}${q.status==='Client PO Issued'?`<button class="btn small green" onclick="assignProject('${q._id}')">Assign Project</button>`:''}</td></tr>`}).join('')}</tbody></table></div>`)}
function projectTotals(p){const expenses=p.expenses||[],lpos=p.lpos||[];const te=expenses.reduce((s,x)=>s+num(x.amount),0),tl=lpos.reduce((s,x)=>s+num(x.amount),0),profit=num(p.value)-te-tl;return{te,tl,profit}}

function openModalForm(title,form,key,id){currentForm=key;editId=id||null;document.getElementById('modal-title').textContent=title;document.getElementById('modal-body').innerHTML=form;document.querySelectorAll('#modal-body select[data-selected]').forEach(sel=>{const keep=sel.getAttribute('data-selected')||'';if(keep!==''||Array.from(sel.options).some(o=>o.value==='')) sel.value=keep;});document.getElementById('modal-delete').style.display=(id&&isAdmin())?'':'none';document.getElementById('modal-bg').classList.add('open')}function closeModal(){document.getElementById('modal-bg').classList.remove('open');currentForm=null;editId=null}function deleteCurrent(){if(currentForm&&editId){deleteDoc(currentForm,editId);closeModal()}}

async function saveProjectSub(form,pid){const p=data.projects.find(x=>x._id===pid);if(!p)return;const obj=form==='projectExpense'?{date:val('f_date'),desc:val('f_desc'),cat:val('f_cat'),amount:num(val('f_amount')),ref:val('f_ref'),addedBy:currentUser}:{no:val('f_no'),date:val('f_date'),vendor:val('f_vendor'),vendorQuote:val('f_vq'),scope:val('f_scope'),amount:num(val('f_amount')),status:val('f_status'),notes:val('f_notes')};const payload={...p,expenses:[...(p.expenses||[])],lpos:[...(p.lpos||[])]};if(form==='projectExpense')payload.expenses.push(obj);else payload.lpos.push(obj);await saveDoc('projects',payload,pid)}

async function basePDF(title){const logo=await _preloadLogo();const {jsPDF}=window.jspdf;const doc=new jsPDF({orientation:'landscape',unit:'mm',format:'a4'});doc.setFillColor(198,40,40);doc.rect(0,0,297,18,'F');if(logo)doc.addImage(logo,'PNG',10,1,28,16);doc.setTextColor(255,255,255);doc.setFont('helvetica','bold');doc.setFontSize(12);doc.text(title,42,11);doc.setFontSize(8);doc.setFont('helvetica','normal');doc.text('Generated '+new Date().toLocaleDateString('en-GB'),287,11,{align:'right'});doc.setTextColor(30,30,30);return doc}
async function downloadRegisterPDF(key){const doc=await basePDF(labelOf(key)+' Register');const arr=data[key]||[];let y=28;doc.setFontSize(8);arr.forEach((r,i)=>{if(y>190){doc.addPage();y=18}doc.text(Object.entries(r).filter(([k])=>!['_id','createdAt','updatedAt','updatedBy','expenses','lpos'].includes(k)).map(([k,v])=>`${k}: ${Array.isArray(v)?v.length:v}`).join(' | ').slice(0,260),10,y);y+=7});doc.save('NorthGates_'+labelOf(key).replace(/ /g,'_')+'_Register.pdf')}

function downloadCSVFor(key){const headers=headersFor(key),rows=rowsFor(key);if(!rows.length){showToast('No data to export');return}downloadCSV('NorthGates_'+key+'.csv',headers,rows)}function downloadCSV(filename,headers,rows){const csv=[headers,...rows].map(r=>r.map(v=>'"'+String(v??'').replace(/"/g,'""')+'"').join(',')).join('\n');const a=document.createElement('a');a.href='data:text/csv;charset=utf-8,﻿'+encodeURIComponent(csv);a.download=filename;a.click();showToast('CSV downloaded ✓')}
async function downloadQuotePDF(id,internal){const q=data.quotes.find(x=>x._id===id);if(!q)return;const doc=await basePDF(internal?'Internal Quote with Margin':'Quotation');doc.setFontSize(11);let y=30;doc.text('Quote No: '+(q.no||''),10,y);doc.text('Date: '+(q.date||''),220,y);y+=10;doc.text('Client: '+(q.client||''),10,y);y+=10;doc.text('Scope: '+(q.scope||''),10,y);y+=10;doc.text('Location: '+(q.loc||''),10,y);y+=14;doc.setFont('helvetica','bold');doc.text('Sell Price: '+money(q.sellPrice),10,y);if(internal){y+=8;doc.text('Cost Price: '+money(q.costPrice),10,y);y+=8;doc.text('Margin: '+(num(q.sellPrice)?(((num(q.sellPrice)-num(q.costPrice))/num(q.sellPrice))*100).toFixed(2):0)+'%',10,y)}doc.save((internal?'Internal_':'Client_')+(q.no||'Quote').replaceAll('/','-')+'.pdf')}
async function downloadInvoicePDF(id){const i=data.taxInvoices.find(x=>x._id===id);if(!i)return;const c=data.clients.find(x=>x.name===i.client)||{};const doc=await basePDF('Tax Invoice');let y=30;doc.setFontSize(10);doc.text('Invoice No: '+i.no,10,y);doc.text('Date: '+i.date,230,y);y+=10;doc.text('Client: '+i.client,10,y);y+=7;doc.text('Client TRN: '+(c.trn||'–'),10,y);y+=7;doc.text('Project: '+(i.projectNo||'–'),10,y);y+=12;doc.text('Description: '+(i.desc||''),10,y);y+=12;doc.setFont('helvetica','bold');doc.text('Subtotal: '+money(i.amount),10,y);y+=8;doc.text('VAT 5%: '+money(num(i.amount)*.05),10,y);y+=8;doc.text('Total incl. VAT: '+money(num(i.amount)*1.05),10,y);doc.save((i.no||'Invoice').replaceAll('/','-')+'.pdf')}

// APPROVED PROJECT FLOW ENHANCEMENT OVERRIDES
// Keeps Task tab untouched. Adds sortable registers, quote→project, project P&L, LPO, WCR, invoice, and project task flow.
// ═══════════════════════════════════════════════════
const sortStateAll={rfqs:{col:'date',dir:'desc'},vendorQuotes:{col:'date',dir:'desc'},quotes:{col:'date',dir:'desc'},projects:{col:'no',dir:'asc'},taxInvoices:{col:'date',dir:'desc'},vat:{col:'date',dir:'desc'},clients:{col:'name',dir:'asc'},vendors:{col:'name',dir:'asc'}};
function sortBy(key,col){const s=sortStateAll[key]||(sortStateAll[key]={col,dir:'asc'});if(s.col===col)s.dir=s.dir==='asc'?'desc':'asc';else{s.col=col;s.dir='asc'}render()}
function sortMark(key,col){const s=sortStateAll[key]||{};return s.col===col?(s.dir==='asc'?' ↑':' ↓'):''}
function th(key,col,label){return `<th onclick="sortBy('${key}','${col}')" style="cursor:pointer">${label}${sortMark(key,col)}</th>`}
function sortRows(key,arr,getters={}){const s=sortStateAll[key]||{};if(!s.col)return arr;return [...arr].sort((a,b)=>{let va=getters[s.col]?getters[s.col](a):a[s.col],vb=getters[s.col]?getters[s.col](b):b[s.col];if(va==null)va='';if(vb==null)vb='';const na=parseFloat(va),nb=parseFloat(vb);if(!isNaN(na)&&!isNaN(nb)){va=na;vb=nb}else{va=String(va).toLowerCase();vb=String(vb).toLowerCase()}if(va<vb)return s.dir==='asc'?-1:1;if(va>vb)return s.dir==='asc'?1:-1;return 0})}
function knownClientOptions(selected=''){const names=[...new Set([...(data.clients||[]).map(c=>c.name),...(data.quotes||[]).map(q=>q.client),...(data.projects||[]).map(p=>p.client)].filter(Boolean))].sort();return names.map(n=>`<option value="${esc(n)}" ${n===selected?'selected':''}>${esc(n)}</option>`).join('')}
function quoteAmount(q){return num(q.sellPrice||q.amt)}
function linkedQuoteObj(no){return data.quotes.find(q=>q.no===no)||{}}
function projectLinkedVendorQuotes(p){const q=linkedQuoteObj(p.quoteNo);return data.vendorQuotes.filter(v=>v.linkedQuote===p.quoteNo||v.no===q.vendorQuote||!v.linkedQuote)}
function projectStage(p){return p.stage||p.paymentStatus||'Project Started'}

function renderRFQs(){const f=sortRows('rfqs',data.rfqs||{});page(`<button class="btn-add" onclick="openRFQ()"><i class="ti ti-plus"></i> New RFQ</button><button class="btn grey" onclick="downloadRegisterPDF('rfqs')"><i class="ti ti-file-type-pdf"></i> PDF</button><button class="btn green" onclick="downloadCSVFor('rfqs')"><i class="ti ti-file-spreadsheet"></i> CSV</button>`,`<div class="q-summ"><div class="sc"><div class="sc-n">${f.length}</div><div class="sc-l">Total RFQs</div></div><div class="sc"><div class="sc-n">${f.filter(x=>x.status==='Site Visit Completed').length}</div><div class="sc-l">Ready for Vendor Quote</div></div><div class="sc"><div class="sc-n">${f.filter(x=>x.status==='Submitted').length}</div><div class="sc-l">Submitted</div></div><div class="sc"><div class="sc-n">${f.filter(x=>x.status==='Awarded').length}</div><div class="sc-l">Awarded</div></div></div><div class="q-wrap"><table class="qtable"><thead><tr>${th('rfqs','date','Date')}${th('rfqs','no','RFQ No.')}${th('rfqs','client','Client')}${th('rfqs','scope','Scope')}${th('rfqs','site','Site')}${th('rfqs','ref','NG Quote Ref')}${th('rfqs','status','Status')}<th>Actions</th></tr></thead><tbody>${f.map(r=>`<tr><td>${esc(r.date||'')}</td><td style="font-family:DM Mono">${esc(r.no||'')}</td><td>${esc(r.client||'')}</td><td>${esc(r.scope||'')}<br><span class="muted">${esc(r.notes||'')}</span></td><td>${esc(r.site||'')}</td><td>${esc(r.ref||'–')}</td><td><span class="qbadge ${r.status==='Site Visit Completed'?'q-site':r.status==='Submitted'||r.status==='Awarded'?'q-acc':r.status==='Lost'?'q-lost':'q-pend'}">${esc(r.status||'Pending')}</span></td><td><button class="btn small ghost" onclick="openTaskFromRFQ('${r._id}')">Task</button>${r.status==='Site Visit Completed'?` <button class="btn small blue" onclick="openVendorQuote(null,'${r._id}')">Vendor Quote</button>`:''}<button class="btn small ghost" onclick="openRFQ('${r._id}')">Edit</button></td></tr>`).join('')}</tbody></table></div>`)}

function renderQuotes(){const f=sortRows('quotes',data.quotes||{}, {sell:q=>quoteAmount(q),margin:q=>quoteAmount(q)?((quoteAmount(q)-num(q.costPrice))/quoteAmount(q))*100:0});page(`<button class="btn-add" onclick="openQuote()"><i class="ti ti-plus"></i> New Quote</button><button class="btn grey" onclick="downloadRegisterPDF('quotes')"><i class="ti ti-file-type-pdf"></i> PDF</button><button class="btn green" onclick="downloadCSVFor('quotes')"><i class="ti ti-file-spreadsheet"></i> CSV</button>`,`<div class="q-summ"><div class="sc"><div class="sc-n">${f.length}</div><div class="sc-l">Total Quotes</div></div><div class="sc"><div class="sc-n">${money(f.reduce((s,q)=>s+quoteAmount(q),0))}</div><div class="sc-l">Quote Amount</div></div><div class="sc"><div class="sc-n">${money(f.reduce((s,q)=>s+Math.max(quoteAmount(q)-num(q.costPrice),0),0))}</div><div class="sc-l">Estimated Profit</div></div><div class="sc"><div class="sc-n">${f.filter(q=>q.status==='Client PO Issued').length}</div><div class="sc-l">PO Issued</div></div></div><div class="q-wrap"><table class="qtable"><thead><tr>${th('quotes','date','Date')}${th('quotes','no','Quote No.')}${th('quotes','client','Client')}${th('quotes','scope','Scope / Location')}${th('quotes','sell','Quote Amount')}${th('quotes','margin','Margin')}${th('quotes','status','Status')}<th>Actions</th></tr></thead><tbody>${f.map(q=>{const sell=quoteAmount(q),margin=sell?((sell-num(q.costPrice))/sell*100):0;const hasProject=data.projects.some(p=>p.quoteNo===q.no);return `<tr><td>${esc(q.date||'')}</td><td style="font-family:DM Mono">${esc(q.no||'')}</td><td>${esc(q.client||'')}</td><td>${esc(q.scope||'')}<br><span class="muted">${esc(q.loc||'')}</span></td><td><strong>${money(sell)}</strong></td><td class="${margin>=0?'profit-pos':'profit-neg'}">${margin.toFixed(1)}%</td><td><span class="qbadge ${q.status==='Client PO Issued'?'q-po':q.status==='Accepted'?'q-acc':q.status==='Lost'?'q-lost':q.status==='Sent'?'q-sent':'q-draft'}">${esc(q.status||'Draft')}</span></td><td><button class="btn small ghost" onclick="openQuote('${q._id}')">Edit</button><button class="btn small blue" onclick="downloadQuotePDF('${q._id}',false)">Client PDF</button>${isAdmin()?`<button class="btn small orange" onclick="downloadQuotePDF('${q._id}',true)">Margin PDF</button>`:''}${q.status==='Client PO Issued'?`<button class="btn small green" onclick="assignProject('${q._id}')">${hasProject?'Open Project':'Assign Project'}</button>`:''}</td></tr>`}).join('')}</tbody></table></div>`)}

function projectTotals(p){const expenses=p.expenses||[],lpos=p.lpos||[];const te=expenses.reduce((s,x)=>s+num(x.amount),0),tl=lpos.reduce((s,x)=>s+num(x.amount),0),profit=num(p.value)-te-tl;return{te,tl,profit}}
function renderProjects(){const f=sortRows('projects',data.projects||{}, {value:p=>num(p.value),expenses:p=>projectTotals(p).te,lpo:p=>projectTotals(p).tl,profit:p=>projectTotals(p).profit,stage:p=>projectStage(p)});const totals=f.reduce((a,p)=>{const t=projectTotals(p);a.contract+=num(p.value);a.exp+=t.te;a.lpo+=t.tl;a.profit+=t.profit;if(t.profit<0)a.loss++;if((p.status||'Active')==='Active')a.active++;if((p.status||'')==='Completed')a.completed++;return a},{contract:0,exp:0,lpo:0,profit:0,loss:0,active:0,completed:0});page(`<button class="btn-add" onclick="openProject()"><i class="ti ti-plus"></i> New Project</button><button class="btn grey" onclick="downloadRegisterPDF('projects')"><i class="ti ti-file-type-pdf"></i> PDF</button><button class="btn green" onclick="downloadCSVFor('projects')"><i class="ti ti-file-spreadsheet"></i> CSV</button>`,`<div class="q-summ" style="grid-template-columns:repeat(4,1fr)"><div class="sc"><div class="sc-n">${f.length}</div><div class="sc-l">Total Projects</div></div><div class="sc"><div class="sc-n">${totals.active}</div><div class="sc-l">Active</div></div><div class="sc"><div class="sc-n">${money(totals.contract)}</div><div class="sc-l">Contract Value</div></div><div class="sc"><div class="sc-n ${totals.profit>=0?'profit-pos':'profit-neg'}">${money(totals.profit)}</div><div class="sc-l">Gross Profit / Loss</div></div><div class="sc"><div class="sc-n">${money(totals.exp)}</div><div class="sc-l">Total Expenses</div></div><div class="sc"><div class="sc-n">${money(totals.lpo)}</div><div class="sc-l">Total Vendor LPO</div></div><div class="sc"><div class="sc-n">${totals.completed}</div><div class="sc-l">Completed</div></div><div class="sc"><div class="sc-n" style="color:var(--red)">${totals.loss}</div><div class="sc-l">Loss Projects</div></div></div><div class="q-wrap"><table class="qtable"><thead><tr>${th('projects','no','Project No.')}${th('projects','title','Title / Client')}${th('projects','quoteNo','Quote')}${th('projects','value','Contract')}${th('projects','expenses','Expenses')}${th('projects','lpo','LPO')}${th('projects','profit','P&L')}${th('projects','stage','Stage')}${th('projects','status','Status')}<th>Actions</th></tr></thead><tbody>${f.map(p=>{const t=projectTotals(p);return `<tr><td style="font-family:DM Mono">${esc(p.no)}</td><td>${esc(p.title||'')}<br><span class="muted">${esc(p.client||'')}</span></td><td>${esc(p.quoteNo||'')}</td><td>${money(p.value)}</td><td>${money(t.te)}</td><td>${money(t.tl)}</td><td class="${t.profit>=0?'profit-pos':'profit-neg'}">${money(t.profit)}</td><td>${stageBadge(projectStage(p))}</td><td><span class="qbadge ${p.status==='Completed'?'q-acc':p.status==='On Hold'?'q-hold':p.status==='Cancelled'?'q-lost':'q-active'}">${esc(p.status||'Active')}</span></td><td><button class="btn small ghost" onclick="toggleProject('${p._id}')">Details</button><button class="btn small ghost" onclick="openProject('${p._id}')">Edit</button><button class="btn small blue" onclick="openInvoiceFromProject('${p._id}')">Invoice</button><button class="btn small green" onclick="openTaskFromProject('${p._id}')">Task</button></td></tr>${expandedProject===p._id?projectDetailHTML(p):''}`}).join('')}</tbody></table></div>`)}

function projectDetailHTML(p){const expenses=p.expenses||[],lpos=p.lpos||[],tasks=(data.tasks||[]).filter(t=>t.projectNo===p.no||String(t.desc||'').includes('Project: '+p.no)),invoices=(data.taxInvoices||[]).filter(i=>i.projectNo===p.no),t=projectTotals(p);return `<tr><td colspan="10"><div class="detail-panel"><div class="q-summ" style="grid-template-columns:repeat(4,1fr);margin-bottom:12px"><div class="sc"><div class="sc-n">${money(p.value)}</div><div class="sc-l">Contract Value</div></div><div class="sc"><div class="sc-n">${money(t.tl)}</div><div class="sc-l">Vendor LPO</div></div><div class="sc"><div class="sc-n">${money(t.te)}</div><div class="sc-l">Expenses</div></div><div class="sc"><div class="sc-n ${t.profit>=0?'profit-pos':'profit-neg'}">${money(t.profit)}</div><div class="sc-l">Gross P&L</div></div></div><div class="subhead"><h3>Project Control</h3><div><select id="stage_${p._id}" style="height:26px">${['Project Started','Work In Progress','WCR Created','Invoice Drafted','Invoice Sent','Payment Pending','Payment Collected','Completed'].map(s=>`<option ${projectStage(p)===s?'selected':''}>${s}</option>`).join('')}</select> <button class="btn small" onclick="updateProjectStage('${p._id}')">Update Status</button> <a class="btn small blue" href="https://sindsubr.github.io/NorthGates_WCR_Generator.html" target="_blank"><i class="ti ti-external-link"></i> WCR Generator</a></div></div><div class="muted">WCR Status: ${esc(p.wcrStatus||'Not Created')} | Payment: ${esc((invoices.find(i=>i.paymentStatus==='Paid')&&'Paid')||'Pending')}</div><div class="subhead"><h3>Vendor LPOs</h3><button class="btn small" onclick="openProjectSub('${p._id}','lpo')">+ LPO from Vendor Quote</button></div><table class="qtable"><thead><tr><th>LPO No.</th><th>Date</th><th>Vendor</th><th>Vendor Quote</th><th>Scope</th><th>Amount</th><th>Status</th><th>PDF</th></tr></thead><tbody>${lpos.map((l,i)=>`<tr><td>${esc(l.no)}</td><td>${esc(l.date)}</td><td>${esc(l.vendor)}</td><td>${esc(l.vendorQuote||'')}</td><td>${esc(l.scope)}</td><td>${money(l.amount)}</td><td>${esc(l.status)}</td><td><button class="btn small ghost" onclick="downloadLPOPDF('${p._id}',${i})">PDF</button></td></tr>`).join('')||'<tr><td colspan="8">No LPOs yet</td></tr>'}</tbody></table><div class="subhead"><h3>Expenses</h3><button class="btn small" onclick="openProjectSub('${p._id}','expense')">+ Expense</button></div><table class="qtable"><thead><tr><th>Date</th><th>Description</th><th>Category</th><th>Amount</th><th>VAT</th><th>Ref</th><th>Added By</th></tr></thead><tbody>${expenses.map(e=>`<tr><td>${esc(e.date)}</td><td>${esc(e.desc)}</td><td>${esc(e.cat)}</td><td>${money(e.amount)}</td><td>${money(num(e.vatAmount||num(e.amount)*.05))}</td><td>${esc(e.ref||'')}</td><td>${esc(e.addedBy||'')}</td></tr>`).join('')||'<tr><td colspan="7">No expenses yet</td></tr>'}</tbody></table><div class="subhead"><h3>Project Tasks</h3><button class="btn small green" onclick="openTaskFromProject('${p._id}')">+ Create Task</button></div><table class="qtable"><tbody>${tasks.map(ts=>`<tr><td>${esc(ts.title)}</td><td>${esc(ts.assignee||'')}</td><td>${esc(ts.cat||'')}</td><td>${esc(ts.status||'')}</td><td><button class="btn small ghost" onclick="activeTab='tasks';initUI();render();setTimeout(()=>openTask('${ts._id}'),0)">Open</button></td></tr>`).join('')||'<tr><td>No project tasks yet</td></tr>'}</tbody></table><div class="subhead"><h3>Tax Invoices</h3><button class="btn small blue" onclick="openInvoiceFromProject('${p._id}')">+ Create Invoice</button></div><table class="qtable"><tbody>${invoices.map(i=>`<tr><td>${esc(i.no)}</td><td>${esc(i.date)}</td><td>${money(i.amount)}</td><td>${money(num(i.amount)*1.05)}</td><td>${esc(i.paymentStatus||'Draft')}</td><td><button class="btn small ghost" onclick="openInvoice('${i._id}')">Open</button><button class="btn small blue" onclick="downloadInvoicePDF('${i._id}')">PDF</button></td></tr>`).join('')||'<tr><td>No invoices yet</td></tr>'}</tbody></table></div></td></tr>`}

function renderTaxInvoices(){const f=sortRows('taxInvoices',data.taxInvoices||{}, {amount:i=>num(i.amount),vat:i=>num(i.amount)*.05,total:i=>num(i.amount)*1.05,status:i=>i.paymentStatus});page(`<button class="btn-add" onclick="openInvoice()"><i class="ti ti-plus"></i> New Tax Invoice</button><button class="btn grey" onclick="downloadRegisterPDF('taxInvoices')"><i class="ti ti-file-type-pdf"></i> PDF</button><button class="btn green" onclick="downloadCSVFor('taxInvoices')"><i class="ti ti-file-spreadsheet"></i> CSV</button>`,`<div class="q-wrap"><table class="qtable"><thead><tr>${th('taxInvoices','date','Date')}${th('taxInvoices','no','Invoice No.')}${th('taxInvoices','client','Client')}${th('taxInvoices','projectNo','Project')}${th('taxInvoices','quoteNo','Quote')}${th('taxInvoices','amount','Amount')}${th('taxInvoices','vat','VAT 5%')}${th('taxInvoices','total','Total')}${th('taxInvoices','status','Status')}<th>Actions</th></tr></thead><tbody>${f.map(i=>`<tr><td>${esc(i.date)}</td><td style="font-family:DM Mono">${esc(i.no)}</td><td>${esc(i.client)}</td><td>${esc(i.projectNo||'')}</td><td>${esc(i.quoteNo||'')}</td><td>${money(i.amount)}</td><td>${money(num(i.amount)*.05)}</td><td>${money(num(i.amount)*1.05)}</td><td><span class="qbadge ${i.paymentStatus==='Paid'?'q-paid':i.paymentStatus==='Sent'?'q-sent':'q-draft'}">${esc(i.paymentStatus||'Draft')}</span></td><td><button class="btn small ghost" onclick="openInvoice('${i._id}')">Edit</button><button class="btn small blue" onclick="downloadInvoicePDF('${i._id}')">PDF</button><button class="btn small green" onclick="markInvoicePaid('${i._id}')">Paid</button></td></tr>`).join('')}</tbody></table></div>`)}

function renderVAT(){const invs=(data.taxInvoices||[]).filter(i=>['Sent','Paid'].includes(i.paymentStatus));const out=invs.reduce((s,i)=>s+num(i.amount)*.05,0);let input=0;data.projects.forEach(p=>{(p.expenses||[]).forEach(e=>input+=num(e.vatAmount||num(e.amount)*.05));(p.lpos||[]).forEach(l=>{const vendor=data.vendors.find(v=>v.name===l.vendor);if(vendor&&vendor.trn)input+=num(l.vatAmount||num(l.amount)*.05)})});const rows=sortRows('vat',invs,{vat:i=>num(i.amount)*.05,total:i=>num(i.amount)*1.05});page(`<button class="btn grey" onclick="downloadVATPDF()"><i class="ti ti-file-type-pdf"></i> VAT PDF</button><button class="btn green" onclick="downloadVATCSV()"><i class="ti ti-file-spreadsheet"></i> VAT CSV</button>`,`<div class="q-summ"><div class="sc"><div class="sc-n">${money(invs.reduce((s,i)=>s+num(i.amount),0))}</div><div class="sc-l">Sales excl. VAT</div></div><div class="sc"><div class="sc-n">${money(out)}</div><div class="sc-l">Output Tax</div></div><div class="sc"><div class="sc-n">${money(input)}</div><div class="sc-l">Input Tax</div></div><div class="sc"><div class="sc-n" style="color:${out-input>=0?'var(--red)':'var(--green)'}">${money(out-input)}</div><div class="sc-l">Net VAT Payable</div></div></div><div class="q-wrap"><table class="qtable"><thead><tr>${th('vat','date','Date')}${th('vat','no','Invoice No.')}${th('vat','client','Client')}${th('vat','amount','Taxable Amount')}${th('vat','vat','Output VAT')}${th('vat','status','Status')}</tr></thead><tbody>${rows.map(i=>`<tr><td>${esc(i.date)}</td><td>${esc(i.no)}</td><td>${esc(i.client)}</td><td>${money(i.amount)}</td><td>${money(num(i.amount)*.05)}</td><td>${esc(i.paymentStatus)}</td></tr>`).join('')}</tbody></table></div>`)}

function openProject(id){const p=id?data.projects.find(x=>x._id===id):{};openModalForm(id?'Edit Project':'New Project',`<div class="f2">${field('Project No.','f_no','text',p.no||autoNo('NG/PRJ/',data.projects))}${field('Project Name / Title','f_title','text',p.title||'')}</div><div class="f2">${select('Client Name','f_client','<option value="">Select Client</option>'+knownClientOptions(p.client||''),p.client||'')}${select('Linked Quote No.','f_quoteNo','<option value="">Select Quote</option>'+quoteOptions(),p.quoteNo||'')}</div><div class="f3">${field('Contract Value','f_value','number',p.value||'')}${field('Start Date','f_start','date',p.start||today())}${field('Expected End Date','f_end','date',p.end||'')}</div><div class="f2">${select('Status','f_status',['Active','On Hold','Completed','Cancelled'].map(x=>`<option>${x}</option>`).join(''),p.status||'Active')}${select('Assigned To','f_assigned',['Siddarth','Meeran','SK','Sindu'].map(x=>`<option>${x}</option>`).join(''),p.assignedTo||currentUser)}</div>${select('Project Stage','f_stage',['Project Started','Work In Progress','WCR Created','Invoice Drafted','Invoice Sent','Payment Pending','Payment Collected','Completed'].map(x=>`<option>${x}</option>`).join(''),projectStage(p))}${select('WCR Status','f_wcrStatus',['Not Created','Draft','Submitted','Signed'].map(x=>`<option>${x}</option>`).join(''),p.wcrStatus||'Not Created')}${textarea('Notes','f_notes',p.notes||'')}`,'projects',id)}
function openInvoice(id,prefill={}){const i=id?data.taxInvoices.find(x=>x._id===id):prefill;openModalForm(id?'Edit Tax Invoice':'New Tax Invoice',`<div class="f2">${field('Invoice No.','f_no','text',i.no||autoNo('NG/INV/',data.taxInvoices))}${field('Date','f_date','date',i.date||today())}</div><div class="f2">${select('Client Name','f_client','<option value="">Select Client</option>'+knownClientOptions(i.client||''),i.client||'')}${select('Linked Project No.','f_projectNo','<option value="">Select Project</option>'+projectOptions(),i.projectNo||'')}</div>${field('Linked Quote No.','f_quoteNo','text',i.quoteNo||'')}${field('Description / Scope','f_desc','text',i.desc||'')}${field('Amount Before VAT','f_amount','number',i.amount||'')}${select('Invoice Status','f_paymentStatus',['Draft','Sent','Paid'].map(x=>`<option>${x}</option>`).join(''),i.paymentStatus||'Draft')}${field('Payment Received Date','f_paidDate','date',i.paidDate||'')}${textarea('Notes','f_notes',i.notes||'')}`,'taxInvoices',id)}

function openProjectSub(pid,type){const p=data.projects.find(x=>x._id===pid);if(!p)return;currentForm=type==='expense'?'projectExpense':'projectLpo';editId=pid;document.getElementById('modal-title').textContent=type==='expense'?'Add Expense':'Create LPO from Vendor Quote';document.getElementById('modal-delete').style.display='none';const vqopts=projectLinkedVendorQuotes(p).map(v=>`<option value="${esc(v.no)}" data-vendor="${esc(v.vendor)}" data-scope="${esc(v.scope)}" data-amount="${esc(v.amount)}">${esc(v.no)} — ${esc(v.vendor)} (${money(v.amount)})</option>`).join('');document.getElementById('modal-body').innerHTML= type==='expense'?`<div class="f2">${field('Date','f_date','date',today())}${select('Category','f_cat',['Labour','Material','Transport','Subcontract','Other'].map(x=>`<option>${x}</option>`).join(''),'Material')}</div>${field('Description','f_desc','text','')}${field('Amount Before VAT','f_amount','number','')}${field('VAT Amount','f_vat','number','')}${field('Receipt / Ref No.','f_ref','text','')}`:`<div class="f2">${field('LPO No.','f_no','text',autoNo('NG/LPO/',p.lpos||[]))}${field('Date','f_date','date',today())}</div>${select('Linked Vendor Quote Ref','f_vq','<option value="">Select Vendor Quote</option>'+vqopts,'')}<div class="f2">${select('Vendor Name','f_vendor','<option value="">Select Vendor</option>'+optionList(data.vendors),'')}${field('LPO Amount Before VAT','f_amount','number','')}</div>${field('VAT Amount','f_vat','number','')}${field('Scope','f_scope','text','')}${select('Status','f_status',['Draft','Issued','Acknowledged','Delivered','Invoiced','Paid'].map(x=>`<option>${x}</option>`).join(''),'Draft')}${textarea('Notes','f_notes','')}`;document.getElementById('modal-bg').classList.add('open');if(type==='lpo'){setTimeout(()=>{const sel=document.getElementById('f_vq');if(sel)sel.onchange=function(){const opt=sel.selectedOptions[0];if(!opt)return;document.getElementById('f_vendor').value=opt.dataset.vendor||'';document.getElementById('f_scope').value=opt.dataset.scope||'';document.getElementById('f_amount').value=opt.dataset.amount||'';document.getElementById('f_vat').value=((parseFloat(opt.dataset.amount)||0)*0.05).toFixed(2)}})}}

function saveCurrent(){const f=currentForm;if(f==='tasks')return saveDoc('tasks',{title:val('f_title'),desc:val('f_desc'),assignee:val('f_assignee'),status:val('f_status'),cat:val('f_cat'),priority:val('f_priority'),deadline:val('f_deadline')},editId).then(closeModal);if(f==='rfqs')return saveDoc('rfqs',{date:val('f_date'),no:val('f_no'),client:val('f_client'),site:val('f_site'),scope:val('f_scope'),ref:val('f_ref'),status:val('f_status'),notes:val('f_notes')},editId).then(closeModal);if(f==='clients'||f==='vendors'){const o={name:val('f_name'),contact:val('f_contact'),phone:val('f_phone'),email:val('f_email'),trn:val('f_trn'),address:val('f_address'),notes:val('f_notes')};if(f==='vendors')o.tradeLicense=val('f_trade');return saveDoc(f,o,editId).then(closeModal)}if(f==='vendorQuotes')return saveDoc('vendorQuotes',{date:val('f_date'),no:val('f_no'),vendor:val('f_vendor'),scope:val('f_scope'),site:val('f_site'),amount:num(val('f_amount')),validity:val('f_validity'),linkedQuote:val('f_linkedQuote'),status:val('f_status'),notes:val('f_notes')},editId).then(closeModal);if(f==='quotes')return saveDoc('quotes',{date:val('f_date'),no:val('f_no'),client:val('f_client'),vendorQuote:val('f_vendorQuote'),scope:val('f_scope'),loc:val('f_loc'),costPrice:num(val('f_cost')),sellPrice:num(val('f_sell')),amt:num(val('f_sell')),status:val('f_status'),notes:val('f_notes')},editId).then(closeModal);if(f==='projects'){const old=data.projects.find(x=>x._id===editId)||{};return saveDoc('projects',{no:val('f_no'),title:val('f_title'),client:val('f_client'),quoteNo:val('f_quoteNo'),value:num(val('f_value')),start:val('f_start'),end:val('f_end'),status:val('f_status'),assignedTo:val('f_assigned'),stage:val('f_stage'),wcrStatus:val('f_wcrStatus'),notes:val('f_notes'),expenses:old.expenses||[],lpos:old.lpos||[]},editId).then(closeModal)}if(f==='taxInvoices')return saveDoc('taxInvoices',{no:val('f_no'),date:val('f_date'),client:val('f_client'),projectNo:val('f_projectNo'),quoteNo:val('f_quoteNo'),desc:val('f_desc'),amount:num(val('f_amount')),paymentStatus:val('f_paymentStatus'),paidDate:val('f_paidDate'),notes:val('f_notes')},editId).then(closeModal);if(f==='projectExpense'||f==='projectLpo')return saveProjectSub(f,editId).then(closeModal)}
async function saveProjectSub(form,pid){const p=data.projects.find(x=>x._id===pid);if(!p)return;const obj=form==='projectExpense'?{date:val('f_date'),desc:val('f_desc'),cat:val('f_cat'),amount:num(val('f_amount')),vatAmount:num(val('f_vat')||num(val('f_amount'))*.05),ref:val('f_ref'),addedBy:currentUser}:{no:val('f_no'),date:val('f_date'),vendor:val('f_vendor'),vendorQuote:val('f_vq'),scope:val('f_scope'),amount:num(val('f_amount')),vatAmount:num(val('f_vat')||num(val('f_amount'))*.05),status:val('f_status'),notes:val('f_notes')};const payload={...p,expenses:[...(p.expenses||[])],lpos:[...(p.lpos||[])]};if(form==='projectExpense')payload.expenses.push(obj);else payload.lpos.push(obj);await saveDoc('projects',payload,pid)}
function assignProject(qid){const q=data.quotes.find(x=>x._id===qid);if(!q)return;const exists=data.projects.find(p=>p.quoteNo===q.no);if(exists){expandedProject=exists._id;activeTab='projects';initUI();render();return}saveDoc('projects',{no:autoNo('NG/PRJ/',data.projects),title:q.scope,client:q.client,quoteNo:q.no,value:quoteAmount(q),start:today(),end:'',status:'Active',assignedTo:currentUser,stage:'Project Started',wcrStatus:'Not Created',notes:'Created from Quote '+q.no,expenses:[],lpos:[]}).then(()=>{activeTab='projects';initUI();render()})}
function openInvoiceFromProject(pid){const p=data.projects.find(x=>x._id===pid);if(!p)return;openInvoice(null,{client:p.client,projectNo:p.no,quoteNo:p.quoteNo,desc:p.title,amount:p.value,paymentStatus:'Draft'})}
function openTaskFromProject(pid){const p=data.projects.find(x=>x._id===pid);if(!p)return;activeTab='tasks';initUI();render();setTimeout(()=>{openTask();setTimeout(()=>{document.getElementById('f_title').value='Project follow-up - '+(p.no||'');document.getElementById('f_desc').value='Project: '+p.no+' | Quote: '+(p.quoteNo||'')+' | Client: '+(p.client||'')+'\nTrack work/WCR/invoice/payment collection.';document.getElementById('f_cat').value='Operations';document.getElementById('f_assignee').value=p.assignedTo||currentUser},0)},0)}
function updateProjectStage(pid){const p=data.projects.find(x=>x._id===pid),el=document.getElementById('stage_'+pid);if(p&&el){const stage=el.value;const patch={...p,stage};if(stage==='WCR Created')patch.wcrStatus='Draft';if(stage==='Invoice Sent')patch.paymentStatus='Payment Pending';if(stage==='Payment Collected'){patch.paymentStatus='Paid';patch.status='Completed'}saveDoc('projects',patch,pid)}}
async function downloadLPOPDF(pid,idx){const p=data.projects.find(x=>x._id===pid);if(!p||!p.lpos||!p.lpos[idx])return;const l=p.lpos[idx];const doc=await basePDF('Local Purchase Order');let y=30;doc.setFontSize(10);doc.text('LPO No: '+(l.no||''),10,y);doc.text('Date: '+(l.date||''),230,y);y+=10;doc.text('Project: '+(p.no||'')+' - '+(p.title||''),10,y);y+=8;doc.text('Vendor: '+(l.vendor||''),10,y);y+=8;doc.text('Vendor Quote: '+(l.vendorQuote||'–'),10,y);y+=12;doc.text('Scope: '+(l.scope||''),10,y);y+=12;doc.setFont('helvetica','bold');doc.text('Amount: '+money(l.amount),10,y);y+=8;doc.text('VAT 5%: '+money(num(l.vatAmount||num(l.amount)*.05)),10,y);y+=8;doc.text('Total: '+money(num(l.amount)+num(l.vatAmount||num(l.amount)*.05)),10,y);doc.save((l.no||'LPO').replaceAll('/','-')+'.pdf')}

_preloadLogo();
</script>
